services:
  # 1. Python FastAPI Backend Service
  - type: web
    name: duolingo-backend
    env: python
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        fromDatabase:
          name: duolingo-postgres-db
          property: connectionString

  # 2. Next.js Node Frontend Service
  - type: web
    name: duolingo-frontend
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: frontend
    envVars:
      - key: NODE_VERSION
        value: 20.9.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: duolingo-backend
          type: web
          property: host

databases:
  # 3. PostgreSQL Database (Render Free Tier)
  - name: duolingo-postgres-db
    plan: free
    postgresMajorVersion: 15
